; Default build target: Waveshare ESP32-S3-LCD-1.3 (240x240 ST7789V2 SPI,
; QMI8658 IMU, prism cube optics, no touch, no PMU).
;
; Upstream Clawdmeter targets the Waveshare 2.16" AMOLED — that env is
; preserved below as [env:waveshare_amoled_216] if you want to flip back.

[platformio]
default_envs = waveshare_lcd13

[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
framework = arduino
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
upload_speed = 921600
monitor_speed = 115200

nimble_flags =
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1

lvgl_flags =
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

[env:waveshare_lcd13]
platform = ${common.platform}
framework = ${common.framework}
board = ${common.board}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCLAWDMETER_BOARD_LCD13=1
    ${common.nimble_flags}
    ${common.lvgl_flags}
    ; Built-in LVGL Montserrat fonts (drop-in for the smaller 240x240 panel)
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_18=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_36=1
    -DLV_FONT_MONTSERRAT_48=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1

; The custom font .c files were sized for 480x480, and splash/usage_rate
; are part of the upstream's 480-pixel splash-screen engine; drop them so
; the LCD-1.3 build only pulls in code it actually uses.
build_src_filter =
    +<*>
    -<font_tiempos_56.c>
    -<font_tiempos_34.c>
    -<font_styrene_48.c>
    -<font_styrene_28.c>
    -<font_styrene_24.c>
    -<font_styrene_20.c>
    -<font_styrene_16.c>
    -<font_styrene_14.c>
    -<font_styrene_12.c>
    -<font_mono_32.c>
    -<font_mono_18.c>
    -<splash.cpp>
    -<splash_animations.h>
    -<usage_rate.cpp>

[env:waveshare_amoled_216]
platform = ${common.platform}
framework = ${common.framework}
board = ${common.board}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCLAWDMETER_BOARD_AMOLED216=1
    -DXPOWERS_CHIP_AXP2101
    ${common.nimble_flags}
    ${common.lvgl_flags}

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1
